<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortuna Absen - Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f3f6fb;
  --sidebar:#071226;
  --sidebar-2:#101b33;
  --primary:#2563eb;
  --gold:#d6a326;
  --text:#061126;
  --muted:#64748b;
  --card:#ffffff;
  --danger:#dc2626;
  --success:#16a34a;
  --border:#e5eaf3;
  --shadow:0 18px 40px rgba(15,23,42,.08);
  --radius:20px;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#f8fafc,#eef3fb);
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  min-height:100vh;
  background:linear-gradient(180deg,var(--sidebar),var(--sidebar-2));
  color:white;
  padding:20px;
}

.sidebar h2{
  font-weight:900;
}
.sidebar h2 span{color:var(--gold)}

.menu{
  margin-top:30px;
}
.menu a{
  display:block;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  color:#dbeafe;
  text-decoration:none;
  font-weight:600;
}
.menu a:hover{
  background:rgba(255,255,255,.1);
}
.menu .active{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* HEADER */
.header{
  background:white;
  padding:20px;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  margin-bottom:20px;
}

.header h1{
  margin:0;
  font-size:26px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.card{
  background:white;
  padding:20px;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}

.card h3{
  font-size:14px;
  color:var(--muted);
}

.card h2{
  margin-top:10px;
  font-size:32px;
}

/* TABLE */
.table{
  margin-top:20px;
  background:white;
  padding:20px;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #eee;
}

.badge{
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}

.success{background:#dcfce7;color:#166534}
.danger{background:#fee2e2;color:#991b1b}
.warning{background:#fef3c7;color:#92400e}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.btn-primary{
  background:#2563eb;
  color:white;
}

.logout{
  float:right;
  background:#fee2e2;
  color:#991b1b;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Fortuna <span>Absen</span></h2>

  <div class="menu">
    <a class="active">Dashboard</a>
    <a>Data Karyawan</a>
    <a>Data Absen</a>
    <a>Jam Kerja</a>
    <a>Download</a>
  </div>
</div>

<div class="main">

  <div class="header">
    <h1>Halo, Admin</h1>
    <button class="logout">Logout</button>
    <p>Pantau absensi secara real-time</p>
  </div>

  <div class="cards">
    <div class="card"><h3>Total Karyawan</h3><h2 id="karyawan">6</h2></div>
    <div class="card"><h3>Hadir Hari Ini</h3><h2 id="hadir">0</h2></div>
    <div class="card"><h3>Terlambat</h3><h2 id="telat">0</h2></div>
    <div class="card"><h3>Pulang Cepat</h3><h2 id="cepat">0</h2></div>
  </div>

  <div class="table">
    <h3>Data Absen Hari Ini</h3>
    <table>
      <thead>
        <tr>
          <th>Nama</th>
          <th>Jam Masuk</th>
          <th>Jam Pulang</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="table">
      </tbody>
    </table>
  </div>

</div>

<script>
// SETTING JAM
let jamMasuk = "08:00";
let jamPulang = "17:00";

// DATA CONTOH
let data = [
  {nama:"Andi", masuk:"08:30", pulang:"16:00"},
  {nama:"Budi", masuk:"07:50", pulang:"17:10"},
  {nama:"Siti", masuk:"08:10", pulang:"17:00"},
];

// HITUNG STATUS
let hadir=0,telat=0,cepat=0;

let tbody = document.getElementById("table");

data.forEach(d=>{
  hadir++;

  let status = "Hadir";
  let badge = "success";

  if(d.masuk > jamMasuk){
    status = "Terlambat";
    badge="danger";
    telat++;
  }

  if(d.pulang < jamPulang){
    status = "Pulang Cepat";
    badge="warning";
    cepat++;
  }

  tbody.innerHTML += `
    <tr>
      <td>${d.nama}</td>
      <td>${d.masuk}</td>
      <td>${d.pulang}</td>
      <td><span class="badge ${badge}">${status}</span></td>
    </tr>
  `;
});

document.getElementById("hadir").innerText = hadir;
document.getElementById("telat").innerText = telat;
document.getElementById("cepat").innerText = cepat;
</script>

</body>
</html>
